<body>
<section class="section__reserve">
  <h3 class="reserve--gr">RESERVE</h3>
  <h2 class="reserve--ja">予約する</h2>

<!-- /* =======================
godY
========================== */ -->
  <form action="">

<div class="reserveArea">
    <!-- selectタグ -->
    <div class="form__item">
      <p class="form__item__label">希望イベント：<span class="--required">必須</span></p>
      <div class="selectWrap">
        <select name="event" title="希望イベント">
          <option value="event__1">自分の絵が動き出す！アニメーション体験</option>
          <option value="event__2">実際に技術や知識を学ぶワークショップ</option>
          <option value="event__3">屋外で季節や自然のインタラクティブな体験</option>
        </select>
      </div>
    </div>


    <!-- inputタグ注意点
     ※ 項目によってtype属性を変えること
     名前の項目ならテキスト入力だから　→　type="text"
     メールアドレスの項目なら　→　type="email"
     電話な項目なら　→　type="number"
     などなど...

     ※ 項目によってname属性を変えること
     これは何のデータをもらうための要素かわかるような名前をつけて
     名前の項目なら → name="yourname"
     ご意見またはご質問の項目なら → name="opinions"
     などなど...

     ※ 初期値をグレー文字で出したいなら
     placeholder="出したいテキスト"
    -->

    <!-- inputタグ（カレンダー） -->
    <div class="form__item">
      <p class="form__item__label">希望日時：<span class="--required">必須</span></p>
      <input type="date" is="default-date" />
    </div>

    <!-- inputタグ（名前） -->
    <div class="form__item">
      <p class="form__item__label">名前（フリガナ）：<span class="--required">必須</span></p>
      <input type="text" name="yourname" placeholder="ヤマダ　タロウ" />
    </div>

    <!-- inputタグ（メールアドレス） -->
    <div class="form__item">
      <p class="form__item__label">メールアドレス：<span class="--required">必須</span></p>
      <input type="email" name="yourEmail" placeholder="xxx@example.com" />
    </div>

    <!-- inputタグ（電話番号） -->
    <div class="form__item">
      <p class="form__item__label">電話番号：<span class="--required">必須</span></p>
      <input type="number" name="yourNumber" placeholder="080-xxxx-xxxx" />
    </div>

    <!-- textareaタグ（ご意見） -->
    <div class="form__item">
      <p class="form__item__label">ご意見またはご質問：<span class="--any">任意</span></p>
      <textarea name="opinions" placeholder="何かあればご入力ください。" ></textarea>      
    </div>
  </form>
<a href="#" class="done">申し込む</a>
</div>
</section>

<!-- 入力フォームのjs -->
  <script>
    document.addEventListener('DOMContentLoaded', _ => {
      document.querySelectorAll('[type=date]').forEach(element => {
        let now = new Date();
        element.value = now.toLocaleDateString('sv-SE');
      });
    });
  </script>
