<section class="section__login">
   <h3 class="login">LOGIN / REGISTRATION</h3>

   <p class="login--bk">会員ログイン</p>

<!-- /* =======================
godY

  <form action="">


    <!-- inputタグ注意点
     ※ 項目によってtype属性を変えること
     名前の項目ならテキスト入力だから　→　type="text"
     メールアドレスの項目なら　→　type="email"
     電話な項目なら　→　type="number"
     などなど...

     ※ 項目によってname属性を変えること
     これは何のデータをもらうための要素かわかるような名前をつけて
     名前の項目なら → name="yourname"
     ご意見またはご質問の項目なら → name="opinions"
     などなど...

     ※ 初期値をグレー文字で出したいなら
     placeholder="出したいテキスト"
    -->

    <!-- inputタグ（メールアドレス） -->
    <div class="form__item">
      <p class="form__item__label">メールアドレス</p>
      <input type="email" name="yourEmail" placeholder="xxx@example.com" />
    </div>

   <div class="form__item">
   <p class="form__item__label">パスワード</p>
   <input type="password" id="pass" name="password" minlength="8" required />
</div>
<a href="reserve.html" class="loginBtn">ログインする</a>
<div class="registration">
   <p class="registration__title">会員登録がお済みでないお客様</p>

<a href="#" class="newLoginBtn">新規会員登録</a>

<!-- 入力フォームのjs -->
  <script>
    document.addEventListener('DOMContentLoaded', _ => {
      document.querySelectorAll('[type=date]').forEach(element => {

        element.value = now.toLocaleDateString('sv-SE');
